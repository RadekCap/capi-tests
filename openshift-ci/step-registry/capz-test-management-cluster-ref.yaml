ref:
  as: capz-test-management-cluster
  from: src
  commands: capz-test-management-cluster-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 45m
  documentation: |-
    Installs CAPI, CAPZ, and ASO controllers on the CI-provisioned OpenShift
    cluster via Helm charts, then validates all controllers and webhooks are ready.
